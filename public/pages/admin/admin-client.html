<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRJPRH - Share Your Feedback</title>
  <meta name="description" content="Your honest feedback helps us grow. Tell us what you feel today.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="admin-style.css">
</head>

<body>
  <div class="feedback-page">
    <div class="bg-glow"></div>

    <nav class="feedback-nav">
      <div class="feedback-logo">
        DRJPRH<span> FEEDBACK</span>
      </div>
    </nav>

    <div class="feedback-container">
      <div class="client-hero">
        <div class="eyebrow">admin/employee</div>
        <h1>
          How are<br>
          you <em>today?</em>
        </h1>
        <p>Your honest feedback helps us grow. Tell us what you feel today.</p>
      </div>

      <!-- Form -->
      <div id="form-wrap">
        <div class="rating-card">
          <div class="corner-logos">
            <img
              src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/LGU%20LOGO-SLbvY5LgCOBmUgP1StiZm35XGvZbO4.png"
              alt="City of General Santos Seal" class="corner-logo corner-logo-left">
            <img
              src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/DRJPRH-LOGO-whs9I1MJKYLMKZCI1yMREuDUe26vWX.jpg"
              alt="Dr. Jorge P. Royeca City Hospital Logo" class="corner-logo corner-logo-right">
          </div>
          <div class="emoji-display">
            <span class="emoji-face" id="emoji-face">&#128566;</span>
            <div class="emoji-label" id="emoji-label">Pick a number</div>
            <div class="emoji-sublabel">1 = Extremely Sad &middot; 10 = Happiest</div>
          </div>

          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>

          <div class="rating-buttons" id="rating-buttons">
            <!-- Buttons will be generated by JavaScript -->
          </div>

          <div class="scale-bar">
            <span>Extremely Sad</span>
            <span>Happiest Ever</span>
          </div>

          <button class="submit-btn" id="submit-btn" disabled>
            Select a Rating to Continue
          </button>
        </div>
      </div>

      <!-- Success -->
      <div class="success-wrap" id="success-wrap">
        <div class="success-card">
          <span class="success-icon" id="success-icon"></span>
          <h3 id="success-title"></h3>
          <p id="success-message"></p>
          <button class="try-again" id="try-again">
            Submit Another Rating
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="admin-script.js"></script>
</body>

</html>
