<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRJPRH — Rate Statistics</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="rate-statistics.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="bg-glow"></div>

  <div class="page">

    <nav class="topnav">
      <a href="../index.html" class="logo">
        DRJPRH<span class="logo-dash">—</span><span class="logo-accent">Statistics</span>
      </a>
      <div class="nav-right">
        <button class="nav-pill" id="refresh-btn" onclick="doRefresh()">Refresh</button>
        <button class="nav-pill" onclick="logout()">Logout</button>
        <a href="../index.html" class="nav-pill">← Back to Hub</a>
      </div>
    </nav>

    <div class="page-heading">
      <span class="eyebrow">Department Analytics</span>
      <h1 class="page-title">Rating <span class="t-green">Statistics</span></h1>
      <div class="title-divider"></div>
      <p class="page-sub">
        Employee &amp; client feedback side by side, pulled from
        <code style="color:var(--green);font-family:'DM Mono',monospace;font-size:12px">public.table_reports</code>.
        Taller bars = more submissions for that score.
      </p>
    </div>

    <div class="filter-bar">
      <button class="f-btn active" onclick="setFilter('daily', this)">Daily</button>
      <button class="f-btn" onclick="setFilter('monthly', this)">Monthly</button>
      <button class="f-btn" onclick="setFilter('yearly', this)">Yearly</button>
    </div>

    <div class="dept-switcher">
      <button class="arrow-btn" onclick="changeDept(-1)">&#8592;</button>
      <div class="dept-chip" id="dept-chip">
        <span class="dept-icon-big" id="d-icon">👥</span>
        <div>
          <div class="dept-name-big" id="d-name">Human Resources</div>
          <div class="dept-counter" id="d-idx">1 / 5</div>
        </div>
      </div>
      <button class="arrow-btn" onclick="changeDept(+1)">&#8594;</button>
    </div>

    <div id="main">
      <div class="status-box">
        <h3>⏳ Loading…</h3>
        <p>Fetching ratings from Supabase.</p>
      </div>
    </div>

  </div>

  <script src="rate-statistics.js"></script>
</body>

</html>
