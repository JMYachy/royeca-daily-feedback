<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRJPRH — Admin Login</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="login-style.css">
</head>

<body>

  <div class="bg-glow"></div>

  <div class="card">
    <div class="heading">
      <span class="eyebrow">Administrator</span>
      <h1>Admin <span>Login</span></h1>
      <div class="divider"></div>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>
      </div>

      <button type="submit" class="btn" id="btn">Login</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="login-script.js"></script>

</body>

</html>
